<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, height=480, initial-scale=1.0">
    <title>AJS Vertical Noir</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFFFFF;
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 320px; height: 480px;
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 100px; /* Taller header for portrait logo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo img { 
            height: 55px; /* Large Logo */
            width: auto;
            margin-bottom: 5px;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            width: 90%;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        #clock { font-weight: 700; color: var(--primary); }

        /* Vertical List Layout */
        .list-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-group {
            display: flex;
            flex-direction: column;
        }

        .label { 
            font-size: 10px; 
            letter-spacing: 1px; 
            color: var(--primary); 
            font-weight: 800;
            text-transform: uppercase;
        }

        .unit {
            font-size: 8px;
            color: #555;
            font-weight: 600;
        }
        
        .price { 
            font-size: 24px; 
            font-weight: 800; 
            color: #FFFFFF;
        }

        .footer-ticker {
            width: 100%;
            height: 35px;
            background: #050505;
            border-top: 1px solid var(--border);
            line-height: 35px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: scroll 15s linear infinite;
            font-size: 11px;
            font-weight: 700;
            color: #888;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="ajslogo.png" alt="AJS Logo">
    </div>
    <div class="header-meta">
        <span id="update-time">Syncing...</span>
        <span id="clock">00:00</span>
    </div>
</header>

<div class="list-container">
    <div class="card">
        <div class="label-group">
            <div class="label">GOLD 23.5K</div>
            <div class="unit">PER 10G</div>
        </div>
        <div class="price" id="val-gold23">--</div>
    </div>
    <div class="card">
        <div class="label-group">
            <div class="label">GOLD 22K</div>
            <div class="unit">PER 10G</div>
        </div>
        <div class="price" id="val-gold22">--</div>
    </div>
    <div class="card">
        <div class="label-group">
            <div class="label">SILVER 999</div>
            <div class="unit">PER 1G</div>
        </div>
        <div class="price" id="val-silver">--</div>
    </div>
    <div class="card">
        <div class="label-group">
            <div class="label">GOLD 18K</div>
            <div class="unit">PER 10G</div>
        </div>
        <div class="price" id="val-gold18">--</div>
    </div>
</div>

<div class="footer-ticker">
    <div class="ticker-move">
        ⚠️ Rates are subject to change without prior notice based on market fluctuations.
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDxhCVRG9h6FneRzGTKp5oKH7cPJ4KP7ME",
        authDomain: "ajs-rate.firebaseapp.com",
        projectId: "ajs-rate",
        databaseURL: "https://ajs-rate-default-rtdb.firebaseio.com",
        appId: "1:230516401745:web:c3dbe00e098b2622253a70"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('rates').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('val-gold23').innerText = data.gold23;
            document.getElementById('val-gold22').innerText = data.gold22;
            document.getElementById('val-gold18').innerText = data.gold18;
            document.getElementById('val-silver').innerText = data.silver;
            if(data.time) document.getElementById('update-time').innerText = data.time;
        }
    });

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { 
            hour12: true, hour: '2-digit', minute: '2-digit' 
        });
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
